<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="manyworldz banner">
  <defs>
    <radialGradient id="nebA" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2a4a7a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2a4a7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebB" cx="0.75" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#2e6b63" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2e6b63" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="#04060b"/>
  <rect width="1280" height="320" fill="url(#nebA)"/>
  <rect width="1280" height="320" fill="url(#nebB)"/>

  <!-- stars: mostly white, a few hot blue and cool orange, like a real field -->
  <g>
    <circle cx="60" cy="40" r="1.2" fill="#eef2f7" opacity="0.8"/>
    <circle cx="140" cy="250" r="0.9" fill="#eef2f7" opacity="0.45"/>
    <circle cx="210" cy="90" r="1.5" fill="#cfe0ff" opacity="0.9"/>
