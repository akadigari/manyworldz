    <circle cx="520" cy="280" r="0.9" fill="#f0d9c8" opacity="0.5"/>
    <circle cx="600" cy="30" r="1.3" fill="#eef2f7" opacity="0.75"/>
    <circle cx="700" cy="240" r="0.9" fill="#eef2f7" opacity="0.5"/>
    <circle cx="790" cy="70" r="1.1" fill="#cfe0ff" opacity="0.65"/>
    <circle cx="880" cy="180" r="0.9" fill="#eef2f7" opacity="0.45"/>
    <circle cx="960" cy="40" r="1.4" fill="#eef2f7" opacity="0.85"/>
    <circle cx="1040" cy="260" r="0.9" fill="#f0d9c8" opacity="0.5"/>
    <circle cx="1120" cy="110" r="1.1" fill="#eef2f7" opacity="0.6"/>
    <circle cx="1200" cy="220" r="0.9" fill="#eef2f7" opacity="0.45"/>
    <circle cx="1250" cy="60" r="1.2" fill="#cfe0ff" opacity="0.75"/>
    <circle cx="90" cy="150" r="0.7" fill="#eef2f7" opacity="0.35"/>
    <circle cx="470" cy="140" r="0.7" fill="#eef2f7" opacity="0.35"/>
    <circle cx="850" cy="290" r="0.7" fill="#eef2f7" opacity="0.35"/>
    <circle cx="1170" cy="30" r="0.7" fill="#eef2f7" opacity="0.35"/>
  </g>

  <!-- one timeline splitting into many worlds:
       hot blue-white threads = YES worlds, cool red-orange = NO worlds -->
  <g fill="none" stroke-linecap="round">
    <path d="M 70 160 H 250" stroke="#5fbdb0" stroke-width="2.5"/>
    <path d="M 250 160 C 360 160 420 60  560 52"  stroke="#a8c7ff" stroke-width="2" opacity="0.95"/>
    <path d="M 250 160 C 360 160 430 100 570 92"  stroke="#a8c7ff" stroke-width="2" opacity="0.7"/>
    <path d="M 250 160 C 370 160 440 135 580 130" stroke="#a8c7ff" stroke-width="2" opacity="0.5"/>
    <path d="M 250 160 C 370 160 440 185 580 190" stroke="#d97e58" stroke-width="2" opacity="0.5"/>
    <path d="M 250 160 C 360 160 430 220 570 228" stroke="#d97e58" stroke-width="2" opacity="0.7"/>
    <path d="M 250 160 C 360 160 420 260 560 268" stroke="#d97e58" stroke-width="2" opacity="0.9"/>
  </g>
  <circle cx="70" cy="160" r="5" fill="#5fbdb0"/>
  <circle cx="250" cy="160" r="4" fill="#eef2f7"/>
  <g fill="#a8c7ff">
    <circle cx="560" cy="52" r="3.5"/>
    <circle cx="570" cy="92" r="3"/>
    <circle cx="580" cy="130" r="2.5"/>
  </g>
  <g fill="#d97e58">
    <circle cx="580" cy="190" r="2.5"/>
    <circle cx="570" cy="228" r="3"/>
    <circle cx="560" cy="268" r="3.5"/>
  </g>

  <!-- title -->
  <text x="620" y="150" font-family="Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="10" fill="#e9f1ff">MANYWORLDZ</text>
  <text x="623" y="194" font-family="Helvetica Neue, Arial, sans-serif" font-size="17" letter-spacing="4" fill="#8b98ad">A CROWD OF AI FORECASTERS · GRADED IN PUBLIC</text>
  <text x="623" y="228" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" letter-spacing="1" fill="#5b6880">every pick logged, graded against real market prices, wins and losses both</text>
</svg>
